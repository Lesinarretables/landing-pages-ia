<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation IA Vidéo | Les Inarrêtables</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/webp" href="/images/favicon.webp">
<link href="https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --navy: #0F1B2D;
  --navy-light: #1A2B45;
  --teal: #3DBFB0;
  --teal-dark: #2FA89A;
  --teal-light: #4DD9C8;
  --gold: #D97706;
  --gold-light: #F59E0B;
  --green: #059669;
  --green-light: #10B981;
  --red: #DC2626;
  --gray-50: #F8FAFC;
  --gray-100: #F1F5F9;
  --gray-200: #E2E8F0;
  --gray-300: #CBD5E1;
  --gray-400: #94A3B8;
  --gray-500: #64748B;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1E293B;
  --gray-900: #0F172A;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; color: var(--gray-800); line-height: 1.6; background: var(--white); -webkit-font-smoothing: antialiased; }
.container { max-width: 760px; margin: 0 auto; padding: 0 20px; }

/* Loader */
.page-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
.page-loader-ring { width: 44px; height: 44px; border: 3px solid var(--gray-200); border-top-color: var(--teal); border-radius: 50%; animation: spin .8s linear infinite; }
.page-loader p { font-size: 15px; color: var(--gray-500); text-align: center; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.page-error { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; padding: 32px; text-align: center; }
.page-error h2 { font-size: 20px; color: var(--navy); }
.page-error p { font-size: 15px; color: var(--gray-600); }

/* Nav sticky */
.nav { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 20px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); background: rgba(255,255,255,.95); }
.nav-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.nav .logo img { height: 44px; width: auto; }
.nav-cta { background: var(--teal); color: var(--white); padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 13px; transition: all .2s; box-shadow: 0 2px 8px rgba(61,191,176,.3); }
.nav-cta:hover { background: var(--teal-dark); transform: translateY(-1px); }

/* Hero */
.hero { background: linear-gradient(175deg, var(--navy) 0%, var(--navy-light) 100%); color: var(--white); padding: 56px 20px 64px; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; top: -200px; right: -200px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(61,191,176,0.1) 0%, transparent 70%); }
.hero::after { content: ''; position: absolute; bottom: -150px; left: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(217,119,6,0.06) 0%, transparent 70%); }
.hero-content { position: relative; z-index: 2; }
.hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(61,191,176,0.1); border: 1px solid rgba(61,191,176,0.2); border-radius: 50px; padding: 6px 14px; font-size: 11px; font-weight: 700; color: var(--teal-light); margin-bottom: 20px; text-transform: uppercase; letter-spacing: .8px; }
.hero-badge .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
.hero h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 900; line-height: 1.12; margin-bottom: 18px; letter-spacing: -1px; }
.hero h1 .accent { color: var(--teal-light); }
.hero .subtitle { font-size: clamp(15px, 2.2vw, 17px); color: var(--gray-400); line-height: 1.7; margin-bottom: 28px; max-width: 600px; }
.hero-cta-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.hero-note { font-size: 12px; color: var(--gray-500); }

/* Bouton */
.btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--teal); color: var(--white); padding: 16px 32px; border-radius: 10px; font-size: 16px; font-weight: 700; text-decoration: none; transition: all .3s; box-shadow: 0 4px 14px rgba(61,191,176,.35); }
.btn-primary:hover { background: var(--teal-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(61,191,176,.4); }

/* Sections */
.section { padding: 56px 20px; }
.section.alt { background: var(--gray-50); }
.section.dark { background: var(--navy); color: var(--white); }
.section-label { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--teal); margin-bottom: 10px; }
.section-title { font-size: clamp(22px, 4vw, 32px); font-weight: 800; color: var(--gray-900); margin-bottom: 14px; letter-spacing: -.5px; line-height: 1.2; }
.section.dark .section-title { color: var(--white); }
.section-subtitle { font-size: 15px; color: var(--gray-600); margin-bottom: 32px; line-height: 1.7; }
.section.dark .section-subtitle { color: var(--gray-400); }

/* Personal Mirror (section "vous avez dit") */
.mirror-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 14px; padding: 24px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.03); }
.mirror-quote { font-size: 15px; color: var(--gray-700); line-height: 1.6; font-style: italic; position: relative; padding-left: 16px; border-left: 3px solid var(--teal); }
.mirror-insight { font-size: 13px; color: var(--gray-500); margin-top: 10px; padding-left: 16px; }
.mirror-insight strong { color: var(--navy); font-weight: 700; }

/* Mechanism */
.mechanism-grid { display: flex; flex-direction: column; gap: 12px; }
.mech-item { display: flex; gap: 12px; align-items: flex-start; }
.mech-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.mech-icon.red { background: #FEF2F2; color: var(--red); }
.mech-icon.green { background: #ECFDF5; color: var(--green); }
.mech-text h4 { font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 2px; }
.mech-text p { font-size: 13px; color: var(--gray-600); line-height: 1.5; }

/* Epiphany Bridge */
.story-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 14px; padding: 24px; position: relative; }
.story-card::before { content: '"'; position: absolute; top: 12px; left: 18px; font-size: 48px; color: var(--teal); opacity: .2; font-family: serif; line-height: 1; }
.story-text { font-size: 14px; color: var(--gray-700); line-height: 1.7; }
.story-author { margin-top: 14px; font-size: 12px; font-weight: 600; color: var(--gray-500); }

/* Tango (qualification) */
.tango-box { background: linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 100%); border: 1px solid #A7F3D0; border-radius: 14px; padding: 24px; position: relative; }
.tango-box::before { content: '✋'; position: absolute; top: 16px; right: 16px; font-size: 24px; }
.tango-box h3 { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
.tango-box p { font-size: 15px; color: var(--gray-700); line-height: 1.7; }

/* Apocalypse */
.apocalypse-box { background: linear-gradient(135deg, #FEF2F2 0%, #FFF7ED 100%); border: 2px solid #FECACA; border-radius: 14px; padding: 28px; text-align: center; }
.apocalypse-box .big-num { font-size: 42px; font-weight: 900; color: var(--red); line-height: 1.1; margin: 8px 0; }
.apocalypse-box .detail { font-size: 13px; color: #92400E; margin-top: 4px; }
.apocalypse-box .narrative { font-size: 15px; color: var(--gray-700); line-height: 1.7; margin-top: 16px; text-align: left; }

/* Reframing */
.reframe-box { background: linear-gradient(135deg, rgba(61,191,176,.05) 0%, rgba(61,191,176,.1) 100%); border: 2px solid rgba(61,191,176,.2); border-radius: 14px; padding: 28px; }
.reframe-box .old-way { font-size: 14px; color: var(--gray-500); text-decoration: line-through; margin-bottom: 8px; }
.reframe-box .new-way { font-size: 18px; font-weight: 800; color: var(--navy); line-height: 1.4; }
.reframe-box .explain { font-size: 15px; color: var(--gray-600); line-height: 1.7; margin-top: 12px; }

/* Mise en garde */
.garde-box { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 14px; padding: 24px; }
.garde-box h4 { font-size: 16px; font-weight: 700; color: #92400E; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.garde-box p { font-size: 14px; color: var(--gray-700); line-height: 1.7; }

/* Freins / FAQ */
.faq-list { display: flex; flex-direction: column; gap: 12px; }
.faq-item { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 20px; }
.faq-item .question { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; }
.faq-item .answer { font-size: 14px; color: var(--gray-600); line-height: 1.6; padding-left: 24px; }

/* Comment ça marche */
.steps-grid { display: flex; flex-direction: column; gap: 16px; counter-reset: step; }
.step-card { display: flex; gap: 16px; align-items: flex-start; }
.step-num { width: 40px; height: 40px; background: var(--teal); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; flex-shrink: 0; }
.step-content h4 { font-size: 15px; font-weight: 700; color: var(--gray-900); margin-bottom: 2px; }
.step-content p { font-size: 13px; color: var(--gray-600); line-height: 1.5; }

/* Video */
.video-wrapper { position: relative; aspect-ratio: 16/9; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,.12); margin: 24px 0; }
.video-wrapper iframe { position: absolute; inset: 0; width: 100%; height: 100%; }

/* Programme - Value Stack */
.programme { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); border-radius: 16px; padding: 28px; color: var(--white); margin-bottom: 20px; }
.programme-badge { display: inline-block; background: rgba(61,191,176,.12); color: var(--teal); font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
.programme h3 { font-size: 22px; font-weight: 900; margin-bottom: 4px; letter-spacing: -.3px; }
.programme .duree { font-size: 13px; color: var(--gray-400); margin-bottom: 6px; }
.programme .accroche { font-size: 14px; color: var(--gray-300); line-height: 1.5; margin-bottom: 20px; }
.module { padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
.module:last-child { border-bottom: none; }
.module-header { display: flex; align-items: center; justify-content: space-between; }
.module-title { font-size: 14px; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 8px; }
.module-title .num { width: 24px; height: 24px; background: rgba(61,191,176,.12); color: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.module-value { font-size: 11px; color: var(--teal); font-weight: 600; white-space: nowrap; }
.module-desc { font-size: 12px; color: var(--gray-400); line-height: 1.5; margin: 4px 0 0 32px; }

/* Value Stack Total */
.stack-total { background: rgba(61,191,176,.08); border: 1px solid rgba(61,191,176,.2); border-radius: 10px; padding: 16px; margin-top: 16px; display: flex; align-items: center; justify-content: space-between; }
.stack-total .label { font-size: 13px; color: var(--gray-300); font-weight: 600; }
.stack-total .price { font-size: 20px; font-weight: 900; color: var(--teal); }
.stack-total .price .old { font-size: 14px; color: var(--gray-500); text-decoration: line-through; font-weight: 500; margin-right: 8px; }

/* Bonuses */
.bonus { background: var(--white); border: 1px solid var(--gold); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
.bonus-icon { width: 36px; height: 36px; background: #FFF7ED; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 16px; flex-shrink: 0; }
.bonus h4 { font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 2px; }
.bonus p { font-size: 12px; color: var(--gray-600); line-height: 1.4; }
.bonus .val { font-size: 11px; color: var(--gold); font-weight: 700; margin-top: 4px; }

/* ROI / Inaction */
.roi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.roi-box { background: #F0FDF4; border: 1px solid #A7F3D0; border-radius: 12px; padding: 16px 8px; text-align: center; }
.roi-num { font-size: 18px; font-weight: 800; color: var(--green); line-height: 1.2; }
.roi-label { font-size: 9px; color: var(--gray-600); margin-top: 4px; text-transform: uppercase; letter-spacing: .3px; font-weight: 600; }
.inaction-box { background: linear-gradient(135deg, #FEF2F2, #FFF7ED); border: 1px solid #FECACA; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
.inaction-label { font-size: 11px; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 4px; }
.inaction-amount { font-size: 30px; font-weight: 900; color: var(--red); line-height: 1.2; }
.inaction-detail { font-size: 13px; color: #92400E; margin-top: 6px; }
.roi-detail { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 16px; font-size: 14px; color: var(--gray-700); line-height: 1.6; }

/* Before/After */
.ba-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.ba-col { border-radius: 14px; padding: 22px; }
.ba-col.before { background: var(--white); border: 2px solid #FECACA; }
.ba-col.after { background: var(--white); border: 2px solid #A7F3D0; }
.ba-label { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding: 3px 10px; border-radius: 6px; }
.ba-col.before .ba-label { background: #FEF2F2; color: var(--red); }
.ba-col.after .ba-label { background: #ECFDF5; color: var(--green); }
.ba-col ul { list-style: none; }
.ba-col li { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; color: var(--gray-700); padding: 7px 0; line-height: 1.5; border-bottom: 1px solid var(--gray-100); }
.ba-col li:last-child { border-bottom: none; }
.ba-col li .ico { font-size: 15px; flex-shrink: 0; }

/* Testimonials */
.testimonial-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.testimonial-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 20px; }
.stars { color: var(--gold-light); font-size: 14px; margin-bottom: 8px; letter-spacing: 2px; }
.testimonial-card blockquote { font-size: 14px; color: var(--gray-700); line-height: 1.6; font-style: italic; margin-bottom: 10px; }
.testimonial-author { font-size: 12px; font-weight: 600; color: var(--gray-500); }
.testimonial-tag { display: inline-block; background: rgba(61,191,176,.08); color: var(--teal-dark); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 6px; }

/* Garanties */
.garanties { display: flex; flex-direction: column; gap: 12px; }
.garantie { display: flex; align-items: flex-start; gap: 12px; }
.garantie-icon { width: 36px; height: 36px; background: #ECFDF5; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 16px; flex-shrink: 0; }
.garantie-content h4 { font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 2px; }
.garantie-content p { font-size: 13px; color: var(--gray-600); line-height: 1.5; }

/* Future Pacing */
.future-timeline { display: flex; flex-direction: column; gap: 0; position: relative; padding-left: 24px; }
.future-timeline::before { content: ''; position: absolute; left: 9px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(to bottom, var(--teal), var(--green)); }
.future-step { position: relative; padding: 12px 0; }
.future-step::before { content: ''; position: absolute; left: -19px; top: 18px; width: 12px; height: 12px; background: var(--teal); border-radius: 50%; border: 2px solid var(--white); box-shadow: 0 0 0 2px var(--teal); }
.future-step .time { font-size: 11px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: .5px; }
.future-step .desc { font-size: 14px; color: var(--gray-700); margin-top: 2px; line-height: 1.5; }

/* CTA Section */
.cta-section { padding: 60px 20px; background: var(--navy); color: var(--white); text-align: center; position: relative; overflow: hidden; }
.cta-section::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(61,191,176,.1) 0%, transparent 70%); }
.cta-section .container { position: relative; z-index: 2; }
.cta-section h2 { font-size: clamp(22px, 4vw, 30px); font-weight: 800; margin-bottom: 12px; letter-spacing: -.5px; }
.cta-section .desc { font-size: 15px; color: var(--gray-400); margin-bottom: 8px; max-width: 540px; margin-left: auto; margin-right: auto; line-height: 1.6; }
.urgency { display: inline-flex; align-items: center; gap: 8px; background: rgba(220,38,38,.1); border: 1px solid rgba(220,38,38,.2); color: #FCA5A5; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; margin: 12px 0 24px; }
.urgency .dot-red { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }

/* TidyCal */
.cal-embed { margin: 24px auto 0; max-width: 100%; background: var(--white); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
.cal-embed iframe { width: 100%; height: 620px; border: none; }

/* Sticky CTA mobile */
.sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--gray-200); padding: 12px 20px; z-index: 200; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 -4px 16px rgba(0,0,0,.08); transform: translateY(100%); transition: transform .3s ease; }
.sticky-cta.visible { transform: translateY(0); }
.sticky-cta .btn-primary { padding: 12px 24px; font-size: 14px; width: 100%; justify-content: center; }

/* Footer */
.page-footer { text-align: center; padding: 24px 20px; font-size: 11px; color: var(--gray-400); border-top: 1px solid var(--gray-200); }
.page-footer a { color: var(--gray-400); text-decoration: none; margin: 0 8px; }

/* Responsive */
@media (min-width: 640px) {
  .ba-grid { grid-template-columns: 1fr 1fr; }
  .testimonial-grid { grid-template-columns: 1fr 1fr; }
  .sticky-cta { display: none; }
}
@media (min-width: 768px) {
  .roi-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div id="page-root">
  <div class="page-loader">
    <div class="page-loader-ring"></div>
    <p>Chargement de votre recommandation...</p>
  </div>
</div>

<!-- Sticky CTA mobile -->
<div class="sticky-cta" id="sticky-cta">
  <a href="#rdv" class="btn-primary" id="sticky-btn">Prendre rendez-vous (20 min) <i class="ti ti-arrow-right" style="font-size:14px;"></i></a>
</div>

<script>
var WORKER_URL = "https://diagnostic-ia.quiet-night-9efd.workers.dev";

async function loadOffre() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get("r");
  if (!id) { showError("Aucune offre à afficher", "Vérifiez le lien reçu après votre diagnostic."); return; }

  try {
    var res = await fetch(WORKER_URL + "/result/" + id);
    if (!res.ok) throw new Error("Not found");
    var data = await res.json();

    // Si pas d'offre data, la generer
    if (!data.offre) {
      document.querySelector('.page-loader p').textContent = "Chargement en cours...";
      try {
        var offreRes = await fetch(WORKER_URL + "/generate-offre", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ history: data.history, profile: data.profile, scores: data.scores, prenom: data.prenom, entreprise: data.entreprise, scorecard: data.scorecard })
        });
        if (offreRes.ok) {
          data.offre = await offreRes.json();
          // Sauvegarder
          fetch(WORKER_URL + "/update-result", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: id, updates: { offre: data.offre } })
          }).catch(function(){});
        }
      } catch (e) { console.log("Offre generation error:", e); }
    }

    renderOffre(data);
    initStickyBar();
  } catch (e) {
    showError("Offre introuvable", "Ce lien a peut-être expiré ou est invalide.");
  }
}

function showError(title, text) {
  document.getElementById("page-root").innerHTML =
    '<div class="page-error"><h2>' + title + '</h2><p>' + text + '</p>' +
    '<a href="https://formations.lesinarretables.com/diagnostic-video-ia.html" style="margin-top:16px;color:var(--teal);font-weight:600;">Refaire le diagnostic</a></div>';
}

function initStickyBar() {
  var sticky = document.getElementById('sticky-cta');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
